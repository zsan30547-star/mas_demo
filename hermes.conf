# /opt/hermes/project_1/hermes.conf
# 职责描述：Nginx 反向代理配置 — 统一入口 http://192.168.117.117

server {
    listen 80 default_server;
    server_name _;

    # 前端静态文件（从 build 产物提供）
    root /opt/hermes/project_1/frontend/dist;
    index index.html;

    # AI 引擎 → FastAPI :8000（/api/v1/* 更精确，优先匹配）
    location /api/v1/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # API → Backend Spring Boot :8080
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE 支持
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # 文件上传下载
    location /uploads/ {
        alias /opt/hermes/project_1/backend/uploads/;
    }

    # SPA 路由：所有非文件路径指向 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
